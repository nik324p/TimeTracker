# Orchestrates the running stack. The long-running demo (TimeTracker.Demo) is added when built.
# Run the one-shot unit tests with:
#   docker compose run --rm --build tests
services:
  # One-shot xUnit run against Core (no DB/broker). Exits non-zero on failure.
  tests:
    build:
      context: .
      dockerfile: tests/TimeTracker.Tests/Dockerfile
    profiles: ["test"]  # excluded from `docker compose up`; run explicitly via `compose run tests`

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: timetracker
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d timetracker"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/TimeTracker.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      Postgres__ConnectionString: "Host=postgres;Port=5432;Database=timetracker;Username=postgres;Password=postgres"
      RabbitMq__Host: rabbitmq
      RabbitMq__Exchange: timetracker.events
      RunMigrationsAtStartup: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Long-running Blazor demo. Server-side HTTP client of the API (no CORS). Starts only
  # once the API is healthy; browse at http://localhost:8090.
  demo:
    build:
      context: .
      dockerfile: src/TimeTracker.Demo/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
      ApiBaseUrl: "http://api:8080"
    ports:
      - "8090:8080"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
